front:
  text: 太上老君元道眞經註解是七
  hash: sha256:871f7a8f9ec94fbe3e5446c707654860d0fdc690952d3d2648e0413e0bc0b09a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0157_SJB_000-170204b, image: sjb/17/170204b.png}
body:
  text: 合明子穩芝內秀註釋題曰元者本也始也道者太上眞一之道也經者徑也本始之眞元此經最妙故曰眞經元道上篇元道者老君無上之道也无上者爲窮高不測為最上之宗故曰无上老君曰其道有五上中下也此分三丹田上中下也故上有泥丸中有赤城下有炁海故曰三也黄庭道有上中下也仙經曰一偶一奇之爲乎味不再嘗偶不再舉諸道各有三皆其次也言諸道者不一之道故法有多門為錬丹而成各相而舉或控鯉而昇天或秉龍而上漢或祭醮而朝元或咽氣而長生或即泝流而延命矣仙經曰道有萬法俱得長生水有千源盡朝東海俱長生也老君中道與黃庭上道比之道有此三經其最上者元道也此道至髙虛无玄妙澹泊无為動合自然故學者難窺焉最上者爲衆經之首妙者爲諸法之門非上士髙機倐然自悟者不可學也故學者宿著道縁志同鐡石者隂功助佑仙氣合成道成歸天非懼於死常舉於生者亦不可學也棄非道之財如𡨚家離妖冶之色若仇讎者方可與道相合説諸中道多慕尚而行之與此道難合故乆不降焉此者若棄眞求假雖得理而難成是不合也若髙機上士特然行之則自得无量也此者爲世人劣量淺學選擇堅固好生惡死之人故曰髙機上士也通易无量更无多難矣出諸廣也又諸道皆有師奉皆云犯罰不一唯此道無諸犯罰故無師奉内教經云爲无爲念不念動不動此三者眞偽相參使曲直相教以名有犯罰也若諸小道須擇山林處乃可行之古髙士混於塵寰不可方可中士隱於山林方可不可故元道與諸道事有差別法有捷門亦无觸犯而返損禁誡異端虚成疾患者此元道理合重玄故無諸損也不然者有損也仙經曰小道易惑中人易敗老子曰不見可慾使心不亂也惟有此道可以塵世而成之仙經曰上道无爲損而非損至理自然病而不病老子曰和其光同其塵湛弓或存故無損也鼻引口吐可以去乎寒熱老子曰玄牝之門此爲生死之根綿綿兮若存能用此理即可天長地乆寒暑難侵故呵屬其心心无積毒故無寒暑及可排積元氣排積者從麤入妙微而成之道自降矣若人急用求當返尅而無功故曰排積也元炁者自然之炁来自冥冥降自虚无悟者有无有用而无无不元故曰元氣也閉氣可以救飢劣通百關治萬病非養炁復元也咽氣可以救虛弱非自然充滿也故上士修眞妙中體妙出入无爲專守一道玄中悟玄不失元道也故仙經曰皷腮强咽當爲求死之由閉極口奔此是傷神之本學道之人切忌此也行氣可以潤肌膚非常道也人能得志者元炁充而有微肌膚潤而光澤雲行雨施萬物滋也炁充百脉萬神靈也仙經曰無毛不通於炁无一節不住於神此道歸根復本合於自然故曰元道老子曰夫物芸芸各復歸其根歸根曰靜靜曰復命大凡運用須眀三一其炁目充若忘而有爲终當目悟不能返朴歸根此是失元道之理也若修成者堅筋補髓固䕶五藏清利泥丸安靜丹臺人若達道筋骨自變返少還童中黃經曰肌膚霜白筋骨青地府除籍天録名坐察隂司役鬼神得元炁精爽恬漢自然天地護衞毒物不行諸疾不生黄庭經云骨青筋赤體如霜七竅去不祥永得安也六不妄入三不妄出者此道也大凡修道切忌六欲内關於心燭亂於神濁於心滯於炁六欲動起六情六情動而六根濁六根濁而六情染六情染而與眞道逺矣三不出者三丹田中三元正炁不可妄而施池爲三丹田中有三元三元凝而成三一三一化而生三䰟三䰟變而都萬神萬神者元道陽神也故元神而成炁炁結而成精精化而爲萬神故曰神神者炁也炁者精精者道也道者物也老子曰恍恍惚惚其中有物物不可忘物仙經曰施炁於人能生其人留炁於身能生其身故不妄出也黄庭經曰若當決海百瀆傾葉去樹枯失青青故不得出也穢濁盡出眞炁倘佯身騰太空上爲眞人自古登眞者皆因此道也穢濁出者謂乆乆而行方得大道五榖滓穢自然頓絶也仙經曰子欲不死腹中無滓故曰盡出也元道中篇人者萬物之中至靈與天地俱生於虛无之始元炁結而成形形旣將立則十天神降在人身中化為神矣老子曰積精聚氣父母和合隂陽交媾始一月爲胚二月爲胞三月爲胎形兆分也三䰟降焉四月四神衛四神者青龍白虎朱雀玄武也五月五藏安鎭也六月六律名六根也七月生七𩲸也八月八景見和眞八神也八景者五臓三丹田是也九月安九宫生九眞九宫者在泥丸周帀上下是也十月成形十天神降元道炁全方得受生故曰與虛无天地同生老子曰天地媾精巳生其人故能成其人矣爲得元道而成形也旣與天地同生於虛无之始合與天地齊壽令且天地乆長即為人不能長乆者何也曰天地能長乆者蓋爲温靜柔和不移本性常守虚寂湛然不勞而得自然之道元眞不散故能乆長也人不能長存者縁生妄想移於本性不執自然不守其根自取其勞常求自益思慮不息關機萬端故兀氣随欲而消散故不得長生也人不能與天地長乆者天元爲而人有爲地元欲而人有欲天常明而人自昩地基敦而人自浮天炁輪而人炁滯地伏泉而人有炁此者與天地相返自不守元道而體虚无故不能同也命延億載者爲留炁身中存其命也六根本来虛靜爲人自生妄想六賊所牽終不得歸根因此六賊心妄生目妄視耳妄聽鼻妄香口妄言舌妄味终不能歸根故不可永存也歸根者爲復无炁之根本也凡爲賊亂中和失其本性心有妄而神自亂目有妄而外視耳有妄而外聽鼻有妄而失靈關言有妄而失眞行舌有妄而玊液不結皆因妄牽去道遠矣復元氣之道别無他法但降心湛寂而巳矣人常能虚心湛寂則自然元炁復也復元炁之法當以減息爲候心神湛寂其息自減減半自心増半壽也半息者爲人一晝一夜有一萬五千息若能歸根定住不至出入者延命本夀外一半從減息至無息則復元歸本矣故可住世永劫而不壞也閉息之道至妙寄意念神眞然體道道復歸身神復歸根玄關微出久而成眞也經曰凡人以有息爲常聖人以无息爲常隂符經曰死者生之根為无息之道也動而有息靜而无息故无息者自然之道也修元道之士常冝以无息爲是有息爲非無息爲常有息爲妄先以減息爲事則易而功多若不以爲事則難而功少但湛然養炁則三靈歡然神䰟暢焉則元炁不習而至矣老子曰人能常清靜萬神悉皆歸黃庭經曰心意如致欣昌此之謂也黄庭之道有三十六愼毎一愼爲應至三十六應乃爲半功諸道應愼皆多惟元道緫一慎三應則成功也故修道之士積功而錬精炁爲定一愼者慎其休止也故修道内守堅固事无暫忘故不可休止也芸愼而止萬無一失三應著三轉意也一轉意一百日為次第而功積相家有其月數第一應一百日有事可止無事可減至此則塵慮自滅煩事俱不能興動也虚澹日増此為第一應也小功成矣第二應二百日忽忽自止爲第二轉意至則不食五穀不嗜五味无大飢渇是中功成矣人至二百日後小功成而中功滿永无飢渴第三轉意者三百日元炁兀然自住元道歸根飢渇不至寒暑不侵死籍永除天地齊壽通世為一周此是大功成矣得道之後地府除籍上天録名東斗注筭西斗注禄北斗落死南斗上生字標仙録永爲眞人矣故曰死籍永除矣位入眞仙出入華胥之國棄賤人間因此而昇天有事止無事減者功萌也此法但有事无事皆可減矣則元炁漸復也忽忽自止者元氣將定也兀然自止者元炁巳定也定者萬物皆壞惟此定身永不動矣大君曰從減息至无息從无息至定定者不取不捨是无爲之定非執定之定也得此定者隂陽自調四時自離元炁自滿衆神目栖惠通玄奥老子曰其智自悟從无入有也故隂陽調則百病不生四時離則寒暑不侵元炁滿則永無飢渇衆神栖則兵虎不害惠通玄奥則萬事不生皆自然之道成矣惠謂不出戸知天下不窺牖見天道大君曰人之思慮不一者元炁皆銷散隂𩲸盛矣惟此道功成妄自滅也修道之人至三百日後猶有隂魔相惱尸鬼動揺忽自猖狂轉生情切徃徃自退切宜守也縱有所發無不善也所用無不中也故有善發有惠發通發皆自然而然也永無喜怒哀懼驚惡之發矣人志道喜怒俱息禍害不生永得功行相承妙自致矣大君曰長生無他神全氣全形全而巳神全虚无氣全湛寂形全清靜元氣充積充者滿積者結衆化成神明也形永存矣神炁皆全故能舉形而昇仙矣住氣兼行氣法訣曰調氣減息其功稍遲若住炁兼行炁其功倍也住炁者候神安和乆而寜帖因而住之至於極者為行通毎候鷄嗚前至寅時可行五七通漸漸加至十通或作意漸増之意炁俱定即定恬自極初可以鼻進數息便住至極有益無損甚微妙也每住息之時須候常喘息出了便住此名外炁不忤亦須先淨一室擇其良友專數其息此要漸漸增多也如此行減息之道功倍速成隂符經曰絶利一源用師十倍其愼者吐引太奔初修之士故未免也不得不慎其奔吐宜愼之爲妙不慎者忽有內傷心見反損也經仙曰岀微微入綿綿明至理自通玄大君曰住氣可以通百關除堅滯治萬病導元氣修行人住氣若園人灌畦一滿而水通百脉衆物皆滋也一炁而靈變萬神三丹俱王故言要在導乎元炁若百關不通則減息元炁隨意自開津路流注元炁與津液所及之處先化爲髓永不壤也中黄經曰蒸筋曝骨達諸關握固漸通開百竅百竅關連緫有神由子軀除歸我身怡然得達自明眞自眀之道永長存故不壤矣炁初時則覺遍身微熱此是元炁充滿四肢盈溢百竅故曰在此應也即須握固運入三丹田三丹田出故流遍终身通於百神可使毛髪躑躅容貌光芒顔如處女仙經曰无一毛不通於炁无一節不住於神此是鍊骨法乆乆集之則金髓玊骨長生仙矣大君曰減息住氣以无息為常定炁爲功若猶減息則功遲若専住炁則難得至於无息若通百關兼行炁減息則元炁自然充盈其功速倍而成矣元炁全身以不舉不動爲頭以不出不入爲足是也泯其萬境息此六情普洗煩心祛滌諸想元道下篇下篇無他法皆言報功經曰但是首篇不見其文道成將舉乃可見也言其報功者報修元道之功也經曰報功之事皆是仙家靈變神用之儀飾駕馭之靈物宮闕之異觀飮饌之珍羞引從之童僕賞玩之玄樂以報修行之功矣萬代記録如茅君九錫爲上道又百倍學元道者无辭勤矣下篇首目約數十篇所記者五篇今以録之中黄經曰人得道之後昇身於寥天之上馭以九霄之儀仗也天尊所賜者十方彩女各執旌麾百龍引駕玉童相随前有龍旛後有虎旗羽服飄飄八風齊吹八鸞而後鳴成歌九鳳而前唱成曲項戴七曜玲瓏之冠足著五色捲雲之履拖蟬帶之帔搭離羅之帔佩於金虎之印上朝太清仙帝者帝者金闕玄元老君功報一志報二不退報三不怠報四不須捨報五元道報別録大君者是南斗之中長生大君也此五者不捨則元道功無不成矣所愼休止若不休止萬不錯矣塵世之事或難行之時有休止休止之中不可不愼今録戒愼于後爲愼休之者言矣一大息減二日功一小乏減二日功一大乏減三十日功一小醉兼吐者減六十日功一大醉兼吐者減一年功一犯慾減三十日功一大嗔減二十日功一哀一懼各減七日功一飽一飢各减五日功一驚減十日功一勞一倦各減二十日功一煩一燥各減五日功一忿減十日功凡飲食觸犯寒暑過差風濕所及起居失節言語散雜老子曰多言數窮不如守中仙經日閉言之人與道合眞又防泄天機易曰愼言語節飲食内守沖和恐失其道也經云與人爭曲直隂功減筭夀思慮煩多此皆減損元炁随所犯輕重度所減多少隨日而補之不可懈怠所言減者損也所減幾日並是減其實功修元道之士深冝愼之元炁難積而易散關節易閉而難通住炁固不可絶其所減尤冝精至凡修取五更初起坐梳頭熟通一百餘過披頭隨意導引摩掣四肢呵吐濁炁微微然待元炁調帖無思慮心湛寂至微自然喘息微而其息自減減至半息增半毒減至無息元道之功成矣古之眞人勤而行之項刻無捨者一年功成矣若是日行二時之功者五年成矣修成此道者乃爲太極元上眞君此經從古至今太上傳十九人皆各登仙昇居太極其經不留於世自大唐元和戊戍歳南統大君因傳孟謫仙孟謫仙轉傳於世至虚至妙過而祕之非人莫傳傳之則殃及玄遠讃曰有元道兮虚無之祖溟涬之根萬經之首三一之門說大魁廓旨細微塵杳兮得信寂兮通神産其有象斗宿星辰論其氣也永骨靈根唯我元道不澄自曒濁之不渾无无之教至定歸根元剛發泄夫物芸芸三十五分得一長存惟我元道獨處爲尊无象之象无始之䰟輪轉日月包褁乾坤圓兮張弓敦兮復淳性善利物養乎群民過貪者捐不足者均目然非有本合乎人太上老君元道眞經註解
